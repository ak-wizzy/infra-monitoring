global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'traefik'
    static_configs:
      - targets:
          - reverse-proxy-traefik:8082

  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: 'cadvisor'
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: 'ubuntu-vm'
    static_configs:
      - targets: ['192.168.1.50:9100']

  - job_name: 'windows-vm'
    static_configs:
      - targets: ['192.168.1.60:9182']