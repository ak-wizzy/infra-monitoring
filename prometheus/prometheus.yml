global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'traefik'
    static_configs:
      - targets:
          - reverse-proxy-traefik:8082

  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: 'cadvisor'
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: 'ubuntu-vm'
    static_configs:
      - targets: 
          - '192.168.1.50:9100'

  - job_name: 'windows-vm'
    static_configs:
      - targets: 
          - '192.168.1.60:9182'  
          
  - job_name: 'blackbox_https'

    metrics_path: /probe

    params:
      module: [https_2xx]

    static_configs:
      - targets:
          - https://grafana.aktechnoservices.com
          - https://guacamole.aktechnoservices.com
          - https://portainer.aktechnoservices.com
          - https://automation.aktechnoservices.com

    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target

      - source_labels: [__param_target]
        target_label: instance

      - target_label: __address__
        replacement: blackbox-exporter:9115

  